name: Deploy API to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GH_PAT
          command_timeout: 20m
          script: |
            set -e
            cd /home/rokev-dynamics/metavix/metavix-api
            git pull https://x-access-token:${GH_PAT}@github.com/orrrrli/metavix-api.git main
            docker compose -f /home/rokev-dynamics/metavix/docker-compose.yml build metavix-api
            docker compose -f /home/rokev-dynamics/metavix/docker-compose.yml up -d metavix-api
