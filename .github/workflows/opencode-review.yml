name: opencode-review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'src/**'
      - 'tests/**'

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Assemble review prompt with project context
        id: prompt
        run: |
          {
            echo 'text<<PROMPT_BLOCK_END'
            cat .github/opencode-review-prompt.md
            echo ''
            echo '--- BEGIN PROJECT CONTEXT (authoritative, do not re-cite) ---'
            echo ''
            echo '## business-rules.md'
            cat .github/reviewer-context/business-rules.md
            echo ''
            echo '## conventions.md'
            cat .github/reviewer-context/conventions.md
            echo ''
            echo '## handler-authorship-context.md'
            cat .github/reviewer-context/handler-authorship-context.md
            echo ''
            echo '## dont-flag.md'
            cat .github/reviewer-context/dont-flag.md
            echo ''
            echo '--- END PROJECT CONTEXT ---'
            echo PROMPT_BLOCK_END
          } >> "$GITHUB_OUTPUT"
      - uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: opencode-go/minimax-m3
          prompt: ${{ steps.prompt.outputs.text }}
